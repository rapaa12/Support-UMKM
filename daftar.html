<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar UMKM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Daftar UMKM</h1>

        <p>
            Bergabunglah bersama ribuan UMKM Indonesia dan mulai
            kembangkan usaha Anda secara digital.
        </p>

        <form>
            <input type="text" placeholder="Nama Lengkap" required>

            <input type="email" placeholder="Email" required>

            <input type="text" placeholder="Nama Usaha" required>

            <button type="submit">Daftar Sekarang</button>
        </form>
    </div>
</div>

</body>
</html>
