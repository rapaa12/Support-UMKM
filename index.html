<!DOCTYPE html>
<html lang="en">
<head>
    <!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Support UMKM</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background: #f5f7fa;
      color: #333;
    }

    header{
      background: linear-gradient(135deg, #0f9d58, #34a853);
      color: white;
      padding: 20px 8%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1{
      font-size: 28px;
    }

    nav a{
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-weight: bold;
      transition: 0.3s;
    }

    nav a:hover{
      color: #d4ffd4;
    }

    .hero{
      min-height: 90vh;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 50px 8%;
      gap: 40px;
    }

    .hero-text{
      flex: 1;
    }

    .hero-text h2{
      font-size: 48px;
      margin-bottom: 20px;
      color: #0f9d58;
    }

    .hero-text p{
      font-size: 18px;
      line-height: 1.7;
      margin-bottom: 30px;
    }

    .btn{
      display: inline-block;
      padding: 14px 28px;
      background: #0f9d58;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover{
      background: #087f46;
    }

    .hero-image{
      flex: 1;
      text-align: center;
    }

    .hero-image img{
      width: 100%;
      max-width: 500px;
    }

    .features{
      padding: 70px 8%;
      background: white;
      text-align: center;
    }

    .features h3{
      font-size: 36px;
      margin-bottom: 50px;
      color: #0f9d58;
    }

    .feature-box{
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
      gap: 25px;
    }

    .card{
      background: #f5f7fa;
      padding: 30px;
      border-radius: 15px;
      transition: 0.3s;
    }

    .card:hover{
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    .card h4{
      margin: 15px 0;
      color: #0f9d58;
    }

    footer{
      background: #0f9d58;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
    }

    @media(max-width: 768px){
      .hero{
        flex-direction: column;
        text-align: center;
      }

      .hero-text h2{
        font-size: 36px;
      }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <h1>Support UMKM</h1>

    <nav>
      <a href="#">Home</a>
      <a href="#">UMKM</a>
      <a href="#">Tentang</a>
      <a href="#">Kontak</a>
    </nav>
  </header>

  <!-- HERO SECTION -->
  <section class="hero">
    <div class="hero-text">
      <h2>Dukung UMKM Indonesia</h2>

      <p>
        Platform digital untuk membantu pelaku UMKM berkembang,
        memperluas pasar, dan meningkatkan penjualan produk lokal
        agar mampu bersaing di era modern.
      </p>

      <a href="#" class="btn">Mulai Sekarang</a>
    </div>

    <div class="hero-image">
      <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="UMKM">
    </div>
  </section>

  
  

</body>
</html>
</head>
<body>
    
</body>
</html>
